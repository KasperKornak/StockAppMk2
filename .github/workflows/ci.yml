name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm test

      # Build with placeholder env vars — the real ones are only needed at
      # runtime (dashboard routes are dynamic, not prerendered), this just
      # catches build-time errors like broken imports or type issues.
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      # Moderate-severity advisories are common in transitive deps and not
      # worth blocking every PR over; high/critical still fail the build.
      - run: npm audit --audit-level=high
